<svg fill="none" viewBox="0 0 800 450" width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Share+Tech+Mono&amp;display=swap');

        .dashboard {
          font-family: 'Orbitron', system-ui, sans-serif;
          background: #080b10;
          width: calc(100% - 4px);
          height: 446px;
          border: 2px solid #00f0ff;
          border-radius: 16px;
          position: relative;
          overflow: hidden;
          box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0, 240, 255, 0.1);
          color: #ffffff;
        }

        /* Scanline Effect */
        .dashboard::before {
          content: " ";
          display: block;
          position: absolute;
          top: 0; left: 0; bottom: 0; right: 0;
          background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 240, 255, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
          z-index: 10;
          background-size: 100% 4px, 3px 100%;
          pointer-events: none;
        }

        /* Moving Grid Background */
        .grid {
          position: absolute;
          width: 200%;
          height: 200%;
          top: -50%;
          left: -50%;
          background-image: 
            linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
          background-size: 40px 40px;
          transform: perspective(500px) rotateX(60deg);
          animation: gridMove 20s linear infinite;
          opacity: 0.4;
          z-index: 0;
        }

        /* Rotating Radar Scanner */
        .radar {
          position: absolute;
          top: 30px;
          right: 40px;
          width: 100px;
          height: 100px;
          border: 2px solid #ff007f;
          border-radius: 50%;
          opacity: 0.7;
          z-index: 1;
        }
        .radar-sweep {
          position: absolute;
          top: 0; left: 0; width: 100%; height: 100%;
          background: conic-gradient(from 0deg, rgba(255,0,127,0.4) 0deg, transparent 90deg);
          border-radius: 50%;
          animation: rotate 4s linear infinite;
        }

        /* Glitch Name */
        .glitch-container {
          position: absolute;
          top: 35px;
          left: 40px;
          z-index: 5;
        }
        .glitch {
          font-size: 38px;
          font-weight: 900;
          letter-spacing: 2px;
          color: #fff;
          text-shadow: 0 0 10px rgba(0,240,255,0.5);
          position: relative;
        }
        .status-tag {
          font-family: 'Share Tech Mono', monospace;
          color: #00f0ff;
          font-size: 14px;
          letter-spacing: 3px;
          margin-top: 5px;
          text-transform: uppercase;
          animation: blink 1.5s infinite;
        }

        /* Main Hologram Info Grid */
        .info-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 20px;
          position: absolute;
          bottom: 40px;
          left: 40px;
          right: 40px;
          z-index: 5;
        }

        /* Interactive Display Cards */
        .card {
          background: rgba(13, 17, 23, 0.75);
          border: 1px solid rgba(0, 240, 255, 0.3);
          border-radius: 8px;
          padding: 18px;
          position: relative;
          box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05);
          transition: all 0.3s ease;
          overflow: hidden;
        }
        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 0; width: 100%; height: 2px;
          background: linear-gradient(90deg, transparent, #00f0ff, transparent);
          animation: scanWidth 3s linear infinite;
        }

        .card-title {
          font-size: 12px;
          color: #8b9bb4;
          text-transform: uppercase;
          letter-spacing: 2px;
          margin-bottom: 8px;
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .card-value {
          font-size: 20px;
          font-weight: 700;
          color: #ffffff;
          text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }
        .card-detail {
          font-family: 'Share Tech Mono', monospace;
          font-size: 13px;
          color: #00ff66;
          margin-top: 5px;
        }

        /* Glowing Pulse Nodes */
        .pulse-node {
          display: inline-block;
          width: 8px;
          height: 8px;
          background-color: #00ff66;
          border-radius: 50%;
          box-shadow: 0 0 8px #00ff66;
          animation: pulse 1.5s infinite alternate;
        }

        /* Keyframes */
        @keyframes gridMove {
          0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
          100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }
        @keyframes rotate {
          100% { transform: rotate(360deg); }
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
        @keyframes pulse {
          0% { transform: scale(1); box-shadow: 0 0 4px #00ff66; }
          100% { transform: scale(1.3); box-shadow: 0 0 12px #00ff66; }
        }
        @keyframes scanWidth {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
      </style>
      <div class="dashboard">
        <div class="grid"></div>
        
        <!-- Radar Widget -->
        <div class="radar">
          <div class="radar-sweep"></div>
        </div>

        <!-- Identity Block -->
        <div class="glitch-container">
          <div class="glitch">GOWTHUM VIJAAY D</div>
          <div class="status-tag"><span class="pulse-node"></span> system.status // agentic_ai_orchestrator</div>
        </div>

        <!-- Info Deck -->
        <div class="info-grid">
          <div class="card">
            <div class="card-title">🤖 CORE ARCHITECTURE</div>
            <div class="card-value">Agentic AI &amp; RL Systems</div>
            <div class="card-detail">&gt; fine-tuning 70B models / multi-agent loops</div>
          </div>
          <div class="card">
            <div class="card-title">🏆 HACKATHON RECORD</div>
            <div class="card-value">10+ Participated &amp; Won</div>
            <div class="card-detail">&gt; top 800 globally / glitchyugam winner</div>
          </div>
          <div class="card">
            <div class="card-title">🥇 OLYMPIAD STATUS</div>
            <div class="card-value">IMO &amp; ISO Double Gold</div>
            <div class="card-detail">&gt; global mathematical &amp; scientific rigor</div>
          </div>
          <div class="card">
            <div class="card-title">♟️ STRATEGIC INTELLIGENCE</div>
            <div class="card-value">1900 ELO (Top 0.5%)</div>
            <div class="card-detail">&gt; chess.com master status active</div>
          </div>
        </div>

      </div>
    </div>
  </foreignObject>
</svg>
