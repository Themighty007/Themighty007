<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
          background: #0d1117;
          width: 100%;
          height: 300px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          position: relative;
          overflow: hidden;
          border-radius: 12px;
        }

        /* Pulsing & Morphing Background Blob */
        .blob {
          position: absolute;
          width: 250px;
          height: 250px;
          background: linear-gradient(135deg, #ff007f 0%, #7928ca 50%, #00dfd8 100%);
          border-radius: 50%;
          filter: blur(40px);
          opacity: 0.55;
          animation: morph 8s infinite alternate, spin 12s linear infinite;
          z-index: 1;
        }

        /* Title text styling */
        .title {
          font-size: 56px;
          font-weight: 800;
          color: #ffffff;
          text-align: center;
          z-index: 2;
          margin: 0;
          letter-spacing: -1.5px;
          background: linear-gradient(to right, #ffffff 30%, #e2e8f0 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
          animation: pulseText 3s ease-in-out infinite alternate;
        }

        /* Subtitle text typing animation */
        .subtitle {
          font-size: 20px;
          color: #94a3b8;
          font-weight: 500;
          margin-top: 15px;
          z-index: 2;
          letter-spacing: 1px;
          text-align: center;
          border-right: 3px solid #ff007f;
          white-space: nowrap;
          overflow: hidden;
          width: 0;
          animation: typing 4s steps(45, end) infinite, blink 0.75s step-end infinite;
        }

        /* Keyframes */
        @keyframes morph {
          0% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
          100% { border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%; }
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        @keyframes pulseText {
          0% { transform: scale(0.98); }
          100% { transform: scale(1.02); }
        }

        @keyframes typing {
          0%, 100% { width: 0; }
          40%, 80% { width: 520px; } /* Fits the character width of subtitle */
        }

        @keyframes blink {
          from, to { border-color: transparent; }
          50% { border-color: #ff007f; }
        }
      </style>
      <div class="container">
        <div class="blob"></div>
        <h1 class="title">GOWTHUM VIJAAY D</h1>
        <div class="subtitle">Agentic AI Engineer | AI Systems Researcher | 3D Web Architect</div>
      </div>
    </div>
  </foreignObject>
</svg>
