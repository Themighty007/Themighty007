<svg fill="none" viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&amp;display=swap');

        .header-container {
          width: 100%;
          height: 240px;
          background: transparent;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          position: relative;
          overflow: hidden;
          font-family: 'Outfit', -apple-system, sans-serif;
        }

        /* Pulsing Morphing Blob in Center Behind Text */
        .blob {
          position: absolute;
          width: 180px;
          height: 180px;
          background: linear-gradient(135deg, #ff5e62 0%, #ff9966 100%);
          border-radius: 50%;
          filter: blur(8px);
          opacity: 0.85;
          animation: morph 6s ease-in-out infinite alternate;
          z-index: 1;
        }

        /* Main Name Text */
        .name {
          font-size: 58px;
          font-weight: 900;
          color: #ffffff;
          z-index: 2;
          margin: 0;
          letter-spacing: -1px;
          text-align: center;
          text-shadow: 0 0 20px rgba(0, 240, 255, 0.6), 0 0 40px rgba(0, 240, 255, 0.3);
          -webkit-text-stroke: 1.5px #00f0ff;
        }

        /* Subtitle */
        .subtitle {
          font-size: 19px;
          color: #ffffff;
          font-weight: 700;
          margin-top: 15px;
          z-index: 2;
          letter-spacing: 0.5px;
          text-align: center;
          opacity: 0.95;
        }

        @keyframes morph {
          0% {
            border-radius: 40% 60% 60% 40% / 40% 50% 50% 60%;
            transform: scale(0.95) rotate(0deg);
          }
          100% {
            border-radius: 60% 40% 40% 60% / 50% 60% 60% 40%;
            transform: scale(1.05) rotate(15deg);
          }
        }
      </style>
      <div class="header-container">
        <div class="blob"></div>
        <h1 class="name">Gowthum Vijaay D</h1>
        <div class="subtitle">Agentic AI Engineer | AI Systems Researcher</div>
      </div>
    </div>
  </foreignObject>
</svg>
